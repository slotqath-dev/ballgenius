<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>QA BallGenius X</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
-webkit-tap-highlight-color:transparent;
}

:root{
--red:#ff1744;
--red2:#850000;
--gold:#ffcc4d;
--bg:#050505;
--card:#111111;
--soft:#181818;
--text:#fff;
--gray:#9f9f9f;
--green:#00d26a;
}

body{
background:
radial-gradient(circle at top right,rgba(255,0,0,.15),transparent 25%),
radial-gradient(circle at bottom left,rgba(255,180,0,.08),transparent 25%),
#050505;

color:#fff;
overflow-x:hidden;
min-height:100vh;
}

body::before{
content:'';
position:fixed;
inset:0;

background:
linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);

background-size:24px 24px;

pointer-events:none;
opacity:.3;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:999;

display:flex;
justify-content:space-between;
align-items:center;

padding:16px 18px;

background:rgba(0,0,0,.55);

backdrop-filter:blur(18px);

border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:26px;
font-weight:900;
}

.logo span{
color:var(--red);
text-shadow:0 0 18px rgba(255,0,0,.7);
}

.header-right{
display:flex;
gap:10px;
}

.icon-btn{
width:42px;
height:42px;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,.05);

border-radius:14px;

border:1px solid rgba(255,255,255,.08);

font-size:18px;
}

/* PAGE */

.page{
display:none;
padding-bottom:120px;
}

.page.active{
display:block;
}

/* HERO */

.hero{
padding:18px;
}

.hero-card{
position:relative;

overflow:hidden;

background:
linear-gradient(135deg,rgba(255,20,60,.22),rgba(0,0,0,.72)),
#101010;

border-radius:34px;

padding:22px;

border:1px solid rgba(255,255,255,.06);

box-shadow:
0 0 30px rgba(255,0,0,.12),
0 12px 40px rgba(0,0,0,.35);
}

.hero-card::after{
content:'';
position:absolute;

width:260px;
height:260px;

background:
radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);

top:-120px;
right:-100px;
}

.live-row{
display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:18px;
}

.live-badge{
display:flex;
align-items:center;
gap:8px;

background:var(--red);

padding:7px 14px;

border-radius:999px;

font-size:13px;
font-weight:800;
}

.dot{
width:8px;
height:8px;

background:#fff;

border-radius:50%;

animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:.2;
transform:scale(.6);
}
}

.match{
display:grid;
grid-template-columns:1fr 120px 1fr;

gap:12px;
align-items:center;
}

.team{
text-align:center;
}

.team img{
width:76px;
height:76px;

background:#fff;

padding:10px;

border-radius:22px;
}

.team-name{
margin-top:10px;
font-size:14px;
font-weight:700;
}

.form{
margin-top:5px;
font-size:11px;
color:#aaa;
}

.score-box{
background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

border-radius:24px;

padding:18px 10px;

text-align:center;
}

.score{
font-size:40px;
font-weight:900;
}

.score span{
color:var(--gold);
}

.match-status{
margin-top:5px;
font-size:12px;
color:#aaa;
}

/* AI */

.ai-box{
margin-top:18px;

background:rgba(255,255,255,.05);

padding:16px;

border-radius:22px;

border:1px solid rgba(255,255,255,.08);
}

.ai-head{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

.ai-title{
font-size:15px;
font-weight:800;
color:var(--gold);
}

.ai-bar{
height:12px;
background:#222;
border-radius:999px;
overflow:hidden;
}

.ai-fill{
height:100%;
width:68%;

background:
linear-gradient(90deg,#ff1744,#ffcc4d);

border-radius:999px;
}

.predict{
margin-top:12px;
font-size:14px;
font-weight:700;
}

.watch-btn{
width:100%;

margin-top:18px;

border:none;

padding:15px;

border-radius:18px;

font-size:15px;
font-weight:800;

color:#fff;

background:
linear-gradient(90deg,#ff1744,#850000);
}

/* SECTION */

.section{
padding:0 18px;
margin-top:18px;
}

.title{
font-size:18px;
font-weight:900;
margin-bottom:14px;
}

.title span{
color:var(--red);
}

/* LEAGUES */

.leagues{
display:flex;
gap:14px;

overflow:auto;

padding-bottom:6px;
}

.leagues::-webkit-scrollbar{
display:none;
}

.league{
min-width:84px;

background:#101010;

border-radius:22px;

padding:12px 10px;

text-align:center;

border:1px solid rgba(255,255,255,.05);

cursor:pointer;

transition:.25s;
}

.league.active{
border-color:rgba(255,0,0,.45);

box-shadow:
0 0 20px rgba(255,0,0,.18);
}

.league img{
width:44px;
height:44px;

background:#fff;

padding:6px;

border-radius:14px;
}

.league-name{
margin-top:8px;
font-size:11px;
font-weight:700;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:1fr 1fr;

gap:14px;

padding:18px;
}

.stat-card{
background:#101010;

border-radius:24px;

padding:16px;

border:1px solid rgba(255,255,255,.05);
}

.stat-label{
font-size:12px;
color:#999;
}

.stat-value{
margin-top:8px;

font-size:28px;
font-weight:900;
}

/* HIGHLIGHT */

.highlights{
display:flex;
gap:16px;
overflow:auto;
padding-bottom:6px;
}

.highlights::-webkit-scrollbar{
display:none;
}

.highlight{
position:relative;

min-width:240px;
height:170px;

overflow:hidden;

border-radius:24px;
}

.highlight img{
width:100%;
height:100%;
object-fit:cover;

filter:brightness(.75);
}

.highlight::after{
content:'';
position:absolute;
inset:0;

background:
linear-gradient(180deg,transparent,rgba(0,0,0,.85));
}

.play{
position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:58px;
height:58px;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,0,0,.92);

border-radius:50%;

font-size:24px;

z-index:2;
}

.highlight-title{
position:absolute;

left:14px;
bottom:14px;

z-index:2;

font-size:14px;
font-weight:700;
}

/* TABLE */

.table{
margin:18px;

background:#101010;

border-radius:28px;

padding:16px;

overflow:auto;

border:1px solid rgba(255,255,255,.05);
}

.table-title{
font-size:20px;
font-weight:900;

color:var(--gold);

margin-bottom:14px;
}

.table-head,
.row{
display:grid;
grid-template-columns:36px 2fr 52px 52px 52px 52px 60px;

align-items:center;
}

.table-head{
font-size:11px;
color:#999;

padding-bottom:10px;
}

.row{
padding:13px 0;

border-bottom:1px solid rgba(255,255,255,.05);

font-size:13px;
font-weight:600;
}

.row:last-child{
border:none;
}

.top4{
background:rgba(255,204,77,.07);
}

.relegation{
background:rgba(255,0,0,.08);
}

.team-row{
display:flex;
align-items:center;
gap:10px;

overflow:hidden;
white-space:nowrap;
}

.team-row img{
width:26px;
height:26px;

background:#fff;

padding:3px;

border-radius:8px;

flex-shrink:0;
}

.pts{
text-align:right;
font-weight:900;
color:var(--gold);
}

/* LIVE PAGE */

.live-card{
margin:18px;

background:#101010;

border-radius:24px;

padding:18px;

border:1px solid rgba(255,255,255,.05);
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;

left:50%;
transform:translateX(-50%);

bottom:16px;

width:calc(100% - 24px);
max-width:520px;

background:rgba(15,15,15,.9);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.05);

padding:12px 10px;

border-radius:28px;

display:grid;
grid-template-columns:repeat(4,1fr);

z-index:999;
}

.nav-item{
text-align:center;

font-size:11px;

color:#999;

cursor:pointer;
}

.nav-item.active{
color:#fff;
font-weight:800;
}

.nav-icon{
font-size:22px;
margin-bottom:4px;
}

@media(max-width:480px){

.match{
grid-template-columns:1fr 100px 1fr;
}

.team img{
width:66px;
height:66px;
}

.score{
font-size:30px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
<span>QA</span> BallGenius
</div>

<div class="header-right">
<div class="icon-btn">🔔</div>
<div class="icon-btn">⚙️</div>
</div>

</header>

<!-- HOME -->

<div class="page active" id="homePage">

<section class="hero">

<div class="hero-card" id="heroCard"></div>

</section>

<section class="section">

<div class="title">
<span>■</span> ลีกยอดนิยม
</div>

<div class="leagues" id="leagueBar"></div>

</section>

<section class="stats">

<div class="stat-card">
<div class="stat-label">
แมตช์วันนี้
</div>

<div class="stat-value">
18
</div>
</div>

<div class="stat-card">
<div class="stat-label">
LIVE ตอนนี้
</div>

<div class="stat-value" style="color:#00d26a;">
6
</div>
</div>

</section>

<section class="section">

<div class="title">
<span>■</span> ไฮไลท์ล่าสุด
</div>

<div class="highlights" id="highlights"></div>

</section>

</div>

<!-- LIVE -->

<div class="page" id="livePage">

<div class="live-card">
<h2>🔴 LIVE MATCH</h2>
<br>
<p>Liverpool 2 - 1 Arsenal</p>
<p>Real Madrid 1 - 0 Barcelona</p>
<p>Bayern 3 - 1 Dortmund</p>
</div>

</div>

<!-- TABLE -->

<div class="page" id="tablePage">

<section class="table">

<div class="table-title" id="tableTitle"></div>

<div id="tableContent"></div>

</section>

</div>

<!-- HIGHLIGHT -->

<div class="page" id="highlightPage">

<section class="section">

<div class="title">
<span>■</span> ไฮไลท์ยอดนิยม
</div>

<div class="highlights" id="highlightPageList"></div>

</section>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

<div class="nav-item active" onclick="showPage('homePage',this)">
<div class="nav-icon">⚽</div>
หน้าหลัก
</div>

<div class="nav-item" onclick="showPage('livePage',this)">
<div class="nav-icon">📺</div>
LIVE
</div>

<div class="nav-item" onclick="showPage('tablePage',this)">
<div class="nav-icon">📊</div>
ตาราง
</div>

<div class="nav-item" onclick="showPage('highlightPage',this)">
<div class="nav-icon">🔥</div>
ไฮไลท์
</div>

</div>

<script>

if(window.Telegram && Telegram.WebApp){
Telegram.WebApp.ready();
Telegram.WebApp.expand();
}

const LEAGUES=[

{
id:39,
name:'พรีเมียร์ลีก',
teams:[
['Liverpool',40],
['Arsenal',42],
['Man City',50],
['Chelsea',49],
['Tottenham',47],
['Man United',33]
]
},

{
id:140,
name:'ลาลีกา',
teams:[
['Barcelona',529],
['Real Madrid',541],
['Atletico',530],
['Girona',547],
['Betis',543],
['Sociedad',548]
]
},

{
id:78,
name:'บุนเดสลีกา',
teams:[
['Bayern',157],
['Leverkusen',168],
['Dortmund',165],
['Leipzig',173],
['Stuttgart',172],
['Frankfurt',169]
]
}

];

const leagueBar=document.getElementById('leagueBar');
const heroCard=document.getElementById('heroCard');
const tableContent=document.getElementById('tableContent');
const tableTitle=document.getElementById('tableTitle');
const highlights=document.getElementById('highlights');
const highlightPageList=document.getElementById('highlightPageList');

LEAGUES.forEach((league,index)=>{

const div=document.createElement('div');

div.className='league'+(index===0?' active':'');

div.innerHTML=`
<img src="https://media.api-sports.io/football/leagues/${league.id}.png">
<div class="league-name">${league.name}</div>
`;

div.onclick=()=>{

document.querySelectorAll('.league')
.forEach(x=>x.classList.remove('active'));

div.classList.add('active');

renderLeague(league);

};

leagueBar.appendChild(div);

});

function renderLeague(league){

const home=league.teams[0];
const away=league.teams[1];

heroCard.innerHTML=`

<div class="live-row">

<div class="live-badge">
<div class="dot"></div>
LIVE MATCH
</div>

<div style="font-size:13px;color:#bbb;">
คืนนี้ 21:00
</div>

</div>

<div class="match">

<div class="team">
<img src="https://media.api-sports.io/football/teams/${home[1]}.png">
<div class="team-name">${home[0]}</div>
<div class="form">🔥🔥🔥 ฟอร์มแรง</div>
</div>

<div class="score-box">

<div class="score">
<span id="homeScore">2</span>
:
<span id="awayScore">1</span>
</div>

<div class="match-status">
LIVE • 67'
</div>

</div>

<div class="team">
<img src="https://media.api-sports.io/football/teams/${away[1]}.png">
<div class="team-name">${away[0]}</div>
<div class="form">⚡ พร้อมบวก</div>
</div>

</div>

<div class="ai-box">

<div class="ai-head">

<div class="ai-title">
🤖 AI วิเคราะห์บอล
</div>

<div>
${home[0]} 68%
</div>

</div>

<div class="ai-bar">
<div class="ai-fill"></div>
</div>

<div class="predict">
คาดการณ์สกอร์ 3 - 1
</div>

</div>

<button class="watch-btn">
▶ รับชมถ่ายทอดสด
</button>

`;

tableTitle.innerText=league.name+' 2025/26';

tableContent.innerHTML=`

<div class="table-head">
<div>#</div>
<div>ทีม</div>
<div>แข่ง</div>
<div>ชนะ</div>
<div>เสมอ</div>
<div>แพ้</div>
<div class="pts">แต้ม</div>
</div>

${league.teams.map((team,index)=>{

let played=30;
let win=22-index;
let draw=4;
let lose=played-win-draw;
let pts=(win*3)+draw;

let cls='';

if(index<4) cls='top4';

if(index>=league.teams.length-1)
cls='relegation';

return`

<div class="row ${cls}">

<div>${index+1}</div>

<div class="team-row">

<img src="https://media.api-sports.io/football/teams/${team[1]}.png">

<span>${team[0]}</span>

</div>

<div>${played}</div>
<div>${win}</div>
<div>${draw}</div>
<div>${lose}</div>

<div class="pts">
${pts}
</div>

</div>

`;

}).join('')}

`;

const highlightHTML=league.teams.map((team,index)=>`

<div class="highlight">

<img src="https://picsum.photos/500/300?random=${league.id+index}">

<div class="play">▶</div>

<div class="highlight-title">
${team[0]} ไฮไลท์ล่าสุด
</div>

</div>

`).join('');

highlights.innerHTML=highlightHTML;

highlightPageList.innerHTML=highlightHTML;

}

function showPage(id,el){

document.querySelectorAll('.page')
.forEach(x=>x.classList.remove('active'));

document.getElementById(id)
.classList.add('active');

document.querySelectorAll('.nav-item')
.forEach(x=>x.classList.remove('active'));

el.classList.add('active');

}

renderLeague(LEAGUES[0]);

/* FAKE LIVE SCORE */

setInterval(()=>{

const home=document.getElementById('homeScore');
const away=document.getElementById('awayScore');

if(home && Math.random()>.8){
home.innerText=parseInt(home.innerText)+1;
}

if(away && Math.random()>.9){
away.innerText=parseInt(away.innerText)+1;
}

},6000);

</script>

</body>
</html>
