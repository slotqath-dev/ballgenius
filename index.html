<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>QA BallGenius Mobile Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
-webkit-tap-highlight-color:transparent;
}

:root{
--bg:#050505;
--card:#111111;
--soft:#191919;
--red:#ff1744;
--gold:#ffcc4d;
--green:#00d26a;
--text:#ffffff;
--gray:#999;
}

body{
background:
radial-gradient(circle at top right,rgba(255,0,60,.12),transparent 30%),
radial-gradient(circle at bottom left,rgba(255,200,0,.08),transparent 30%),
var(--bg);

color:var(--text);
overflow-x:hidden;
min-height:100vh;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:999;

display:flex;
justify-content:space-between;
align-items:center;

padding:14px 16px;

background:rgba(0,0,0,.78);
backdrop-filter:blur(16px);

border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:22px;
font-weight:900;
}

.logo span{
color:var(--red);
}

.header-actions{
display:flex;
gap:10px;
}

.icon-btn{
width:38px;
height:38px;

display:flex;
align-items:center;
justify-content:center;

border-radius:12px;

background:rgba(255,255,255,.05);

font-size:16px;
}

/* HERO */

.hero{
padding:14px;
}

.hero-card{
background:
linear-gradient(135deg,rgba(255,20,60,.22),rgba(0,0,0,.82)),
#101010;

border-radius:26px;

padding:18px;

border:1px solid rgba(255,255,255,.05);
}

.live-top{
display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:16px;
}

.live-badge{
display:flex;
align-items:center;
gap:8px;

background:var(--red);

padding:7px 12px;

border-radius:999px;

font-size:12px;
font-weight:800;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#fff;

animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:.2;
transform:scale(.7);
}
}

.live-time{
font-size:12px;
color:#bbb;
}

/* MATCH */

.match{
display:grid;
grid-template-columns:1fr 90px 1fr;

gap:8px;
align-items:center;
}

.team{
text-align:center;
min-width:0;
}

.team img{
width:62px;
height:62px;

background:#fff;

padding:8px;

border-radius:18px;
}

.team-name{
margin-top:8px;
font-size:12px;
font-weight:700;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.team-form{
margin-top:4px;
font-size:10px;
color:#999;
}

.score-box{
background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.06);

border-radius:18px;

padding:12px 8px;

text-align:center;
}

.score{
font-size:28px;
font-weight:900;
line-height:1;
}

.score span{
color:var(--gold);
}

.match-status{
margin-top:6px;
font-size:11px;
color:#aaa;
}

.watch-btn{
width:100%;

margin-top:16px;

padding:13px;

border:none;

border-radius:16px;

background:
linear-gradient(90deg,#ff1744,#850000);

color:#fff;

font-size:14px;
font-weight:800;
}

/* SECTION */

.section{
padding:0 14px;
margin-top:20px;
}

.title{
font-size:16px;
font-weight:900;
margin-bottom:12px;
}

.title span{
color:var(--red);
}

/* LEAGUES */

.leagues{
display:flex;
gap:12px;

overflow-x:auto;

padding-bottom:4px;
}

.leagues::-webkit-scrollbar{
display:none;
}

.league{
min-width:74px;

background:#111111;

padding:10px 8px;

border-radius:18px;

text-align:center;

border:1px solid rgba(255,255,255,.05);

cursor:pointer;
}

.league.active{
border-color:rgba(255,0,0,.5);
}

.league img{
width:38px;
height:38px;

background:#fff;

padding:5px;

border-radius:12px;
}

.league-name{
margin-top:7px;
font-size:10px;
font-weight:700;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* CARDS */

.grid{
display:grid;
grid-template-columns:1fr 1fr;

gap:12px;

padding:14px;
}

.card{
background:#111111;

border-radius:20px;

padding:14px;
}

.card-label{
font-size:11px;
color:#999;
}

.card-value{
margin-top:6px;
font-size:24px;
font-weight:900;
}

/* AI */

.ai-box{
margin-top:16px;

background:rgba(255,255,255,.05);

padding:14px;

border-radius:18px;
}

.ai-top{
display:flex;
justify-content:space-between;
gap:10px;

margin-bottom:10px;
}

.ai-title{
font-size:13px;
font-weight:800;
color:var(--gold);
}

.ai-percent{
font-size:12px;
font-weight:700;
}

.ai-bar{
height:10px;

background:#222;

border-radius:999px;

overflow:hidden;
}

.ai-fill{
height:100%;
width:68%;

background:
linear-gradient(90deg,#ff1744,#ffcc4d);
}

.predict{
margin-top:10px;
font-size:12px;
line-height:1.5;
color:#ddd;
}

/* TABLE */

.table{
margin:14px;

background:#111111;

border-radius:24px;

padding:14px;

overflow-x:auto;
}

.table-title{
font-size:18px;
font-weight:900;

color:var(--gold);

margin-bottom:14px;
}

.table-head,
.row{
display:grid;
grid-template-columns:
28px
minmax(120px,1fr)
42px
42px
42px
42px
52px;

align-items:center;
}

.table-head{
font-size:10px;
color:#888;

padding-bottom:8px;
}

.row{
padding:11px 0;

border-bottom:1px solid rgba(255,255,255,.05);

font-size:11px;
font-weight:600;
}

.row:last-child{
border-bottom:none;
}

.top4{
background:rgba(255,204,77,.05);
}

.team-row{
display:flex;
align-items:center;
gap:8px;

overflow:hidden;
white-space:nowrap;
}

.team-row img{
width:22px;
height:22px;

background:#fff;

padding:3px;

border-radius:6px;

flex-shrink:0;
}

.team-row span{
overflow:hidden;
text-overflow:ellipsis;
}

.pts{
text-align:right;
font-weight:900;
color:var(--gold);
}

/* PLAYERS */

.players{
display:flex;
gap:12px;

overflow-x:auto;

padding-bottom:4px;
}

.players::-webkit-scrollbar{
display:none;
}

.player-card{
min-width:140px;

background:#111111;

border-radius:20px;

padding:14px;

text-align:center;
}

.player-card img{
width:70px;
height:70px;

border-radius:50%;

object-fit:cover;
}

.player-name{
margin-top:10px;
font-size:13px;
font-weight:700;
}

.player-stat{
margin-top:4px;
font-size:11px;
color:#aaa;
}

/* FIXTURES */

.fixtures{
display:flex;
flex-direction:column;
gap:12px;
}

.fixture{
background:#111111;

padding:14px;

border-radius:18px;
}

.fixture-top{
display:flex;
justify-content:space-between;

font-size:11px;
color:#999;

margin-bottom:10px;
}

.fixture-match{
display:grid;
grid-template-columns:1fr auto 1fr;

gap:8px;
align-items:center;
}

.fixture-team{
display:flex;
align-items:center;
gap:8px;

font-size:12px;
font-weight:600;

min-width:0;
}

.fixture-team img{
width:28px;
height:28px;

background:#fff;

padding:3px;

border-radius:8px;

flex-shrink:0;
}

.fixture-team span{
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}

/* HIGHLIGHT */

.highlights{
display:flex;
gap:14px;

overflow-x:auto;

padding-bottom:4px;
}

.highlights::-webkit-scrollbar{
display:none;
}

.highlight{
position:relative;

min-width:220px;
height:150px;

overflow:hidden;

border-radius:20px;
}

.highlight img{
width:100%;
height:100%;

object-fit:cover;

filter:brightness(.75);
}

.highlight::after{
content:'';
position:absolute;
inset:0;

background:
linear-gradient(180deg,transparent,rgba(0,0,0,.9));
}

.play{
position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:50px;
height:50px;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,0,0,.9);

border-radius:50%;

font-size:22px;

z-index:2;
}

.highlight-title{
position:absolute;

left:12px;
bottom:12px;

z-index:2;

font-size:13px;
font-weight:700;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;

left:50%;
transform:translateX(-50%);

bottom:12px;

width:calc(100% - 18px);

background:rgba(15,15,15,.92);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.05);

padding:10px 8px;

border-radius:22px;

display:grid;
grid-template-columns:repeat(5,1fr);

z-index:999;
}

.nav-item{
text-align:center;

font-size:10px;

color:#999;
}

.nav-item.active{
color:#fff;
font-weight:800;
}

.nav-icon{
font-size:20px;
margin-bottom:4px;
}

</style>
</head>

<body>

<header>

<div class="logo">
<span>QA</span> BallGenius
</div>

<div class="header-actions">
<div class="icon-btn">🔔</div>
<div class="icon-btn">⚙️</div>
</div>

</header>

<section class="hero">

<div class="hero-card" id="heroCard"></div>

</section>

<section class="section">

<div class="title">
<span>■</span> ลีกยอดนิยม
</div>

<div class="leagues" id="leagueBar"></div>

</section>

<div class="grid">

<div class="card">
<div class="card-label">LIVE MATCH</div>
<div class="card-value">12</div>
</div>

<div class="card">
<div class="card-label">AI Accuracy</div>
<div class="card-value" style="color:#00d26a;">91%</div>
</div>

</div>

<section class="section">

<div class="title">
<span>■</span> นักเตะฟอร์มแรง
</div>

<div class="players" id="players"></div>

</section>

<section class="section">

<div class="title">
<span>■</span> โปรแกรมแข่ง
</div>

<div class="fixtures" id="fixtures"></div>

</section>

<section class="table">

<div class="table-title" id="tableTitle"></div>

<div id="tableContent"></div>

</section>

<section class="section">

<div class="title">
<span>■</span> ไฮไลท์ล่าสุด
</div>

<div class="highlights" id="highlights"></div>

</section>

<div style="height:100px"></div>

<div class="bottom-nav">

<div class="nav-item active">
<div class="nav-icon">⚽</div>
Home
</div>

<div class="nav-item">
<div class="nav-icon">📺</div>
Live
</div>

<div class="nav-item">
<div class="nav-icon">📊</div>
Table
</div>

<div class="nav-item">
<div class="nav-icon">📈</div>
Stats
</div>

<div class="nav-item">
<div class="nav-icon">🔥</div>
Clips
</div>

</div>

<script>

const LEAGUES=[

{
id:39,
name:'พรีเมียร์ลีก',
teams:[
['Liverpool',40],
['Arsenal',42],
['Man City',50],
['Chelsea',49],
['Tottenham',47],
['Man United',33]
]
},

{
id:140,
name:'ลาลีกา',
teams:[
['Barcelona',529],
['Real Madrid',541],
['Atletico',530],
['Girona',547],
['Betis',543],
['Sociedad',548]
]
},

{
id:78,
name:'บุนเดสลีกา',
teams:[
['Bayern',157],
['Leverkusen',168],
['Dortmund',165],
['Leipzig',173],
['Stuttgart',172],
['Frankfurt',169]
]
}

];

const heroCard=document.getElementById('heroCard');
const leagueBar=document.getElementById('leagueBar');
const tableContent=document.getElementById('tableContent');
const tableTitle=document.getElementById('tableTitle');
const highlights=document.getElementById('highlights');
const players=document.getElementById('players');
const fixtures=document.getElementById('fixtures');

LEAGUES.forEach((league,index)=>{

const div=document.createElement('div');

div.className='league'+(index===0?' active':'');

div.innerHTML=`
<img src="https://media.api-sports.io/football/leagues/${league.id}.png">
<div class="league-name">${league.name}</div>
`;

div.onclick=()=>{

document.querySelectorAll('.league')
.forEach(x=>x.classList.remove('active'));

div.classList.add('active');

renderLeague(league);

};

leagueBar.appendChild(div);

});

function renderLeague(league){

const home=league.teams[0];
const away=league.teams[1];

heroCard.innerHTML=`

<div class="live-top">

<div class="live-badge">
<div class="dot"></div>
LIVE
</div>

<div class="live-time">
คืนนี้ 21:00
</div>

</div>

<div class="match">

<div class="team">

<img src="https://media.api-sports.io/football/teams/${home[1]}.png">

<div class="team-name">
${home[0]}
</div>

<div class="team-form">
🔥 W W W
</div>

</div>

<div class="score-box">

<div class="score">
<span>2</span> :
<span>1</span>
</div>

<div class="match-status">
67' LIVE
</div>

</div>

<div class="team">

<img src="https://media.api-sports.io/football/teams/${away[1]}.png">

<div class="team-name">
${away[0]}
</div>

<div class="team-form">
⚡ W D W
</div>

</div>

</div>

<div class="ai-box">

<div class="ai-top">

<div class="ai-title">
🤖 AI วิเคราะห์บอล
</div>

<div class="ai-percent">
${home[0]} 68%
</div>

</div>

<div class="ai-bar">
<div class="ai-fill"></div>
</div>

<div class="predict">
${home[0]} มีโอกาสชนะสูงจากฟอร์มล่าสุดและเกมรุกที่ดีกว่า
</div>

</div>

<button class="watch-btn">
▶ รับชมถ่ายทอดสด
</button>

`;

tableTitle.innerText=league.name+' ตารางคะแนน';

tableContent.innerHTML=`

<div class="table-head">

<div>#</div>
<div>ทีม</div>
<div>แข่ง</div>
<div>ชนะ</div>
<div>เสมอ</div>
<div>แพ้</div>
<div class="pts">แต้ม</div>

</div>

${league.teams.map((team,index)=>{

let played=30;
let win=22-index;
let draw=4;
let lose=played-win-draw;
let pts=(win*3)+draw;

let cls=index<4?'top4':'';

return`

<div class="row ${cls}">

<div>${index+1}</div>

<div class="team-row">

<img src="https://media.api-sports.io/football/teams/${team[1]}.png">

<span>${team[0]}</span>

</div>

<div>${played}</div>
<div>${win}</div>
<div>${draw}</div>
<div>${lose}</div>

<div class="pts">${pts}</div>

</div>

`;

}).join('')}

`;

players.innerHTML=league.teams.slice(0,5).map((team,index)=>`

<div class="player-card">

<img src="https://i.pravatar.cc/200?img=${index+10}">

<div class="player-name">
${team[0]} Star
</div>

<div class="player-stat">
⚽ ${10-index} Goals
</div>

<div class="player-stat">
🎯 ${6-index} Assists
</div>

</div>

`).join('');

fixtures.innerHTML=league.teams.slice(0,3).map((team,index)=>`

<div class="fixture">

<div class="fixture-top">
<div>คืนนี้</div>
<div>21:00</div>
</div>

<div class="fixture-match">

<div class="fixture-team">
<img src="https://media.api-sports.io/football/teams/${team[1]}.png">
<span>${team[0]}</span>
</div>

<div>VS</div>

<div class="fixture-team">
<img src="https://media.api-sports.io/football/teams/${league.teams[index+1]?.[1] || team[1]}.png">
<span>${league.teams[index+1]?.[0] || team[0]}</span>
</div>

</div>

</div>

`).join('');

highlights.innerHTML=league.teams.map((team,index)=>`

<div class="highlight">

<img src="https://picsum.photos/500/300?random=${league.id+index}">

<div class="play">
▶
</div>

<div class="highlight-title">
${team[0]} ไฮไลท์ล่าสุด
</div>

</div>

`).join('');

}

renderLeague(LEAGUES[0]);

</script>

</body>
</html>
