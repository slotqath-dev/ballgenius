<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QA BallGenius X PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
-webkit-tap-highlight-color:transparent;
}

:root{
--bg:#050505;
--card:#111111;
--soft:#191919;
--red:#ff1744;
--gold:#ffcc4d;
--green:#00d26a;
--blue:#00bfff;
--text:#ffffff;
--gray:#999;
}

body{
background:
radial-gradient(circle at top right,rgba(255,0,60,.12),transparent 30%),
radial-gradient(circle at bottom left,rgba(255,200,0,.08),transparent 30%),
var(--bg);

color:var(--text);
overflow-x:hidden;
min-height:100vh;
}

body::before{
content:'';
position:fixed;
inset:0;

background:
linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);

background-size:24px 24px;

pointer-events:none;
opacity:.2;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:999;

display:flex;
justify-content:space-between;
align-items:center;

padding:16px 18px;

background:rgba(0,0,0,.7);
backdrop-filter:blur(16px);

border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:26px;
font-weight:900;
}

.logo span{
color:var(--red);
text-shadow:0 0 18px rgba(255,0,0,.7);
}

.header-actions{
display:flex;
gap:10px;
}

.icon-btn{
width:42px;
height:42px;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,.05);

border-radius:14px;

font-size:18px;
}

/* PAGE */

.page{
display:none;
padding-bottom:120px;
animation:fade .25s;
}

.page.active{
display:block;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:none;
}
}

/* HERO */

.hero{
padding:18px;
}

.hero-card{
position:relative;

overflow:hidden;

border-radius:34px;

padding:22px;

background:
linear-gradient(135deg,rgba(255,20,60,.25),rgba(0,0,0,.8)),
#101010;

border:1px solid rgba(255,255,255,.05);

box-shadow:
0 15px 40px rgba(0,0,0,.4),
0 0 25px rgba(255,0,0,.15);
}

.hero-card::after{
content:'';
position:absolute;

width:260px;
height:260px;

background:
radial-gradient(circle,rgba(255,255,255,.15),transparent 70%);

right:-90px;
top:-90px;
}

.live-top{
display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:18px;
}

.live-badge{
display:flex;
align-items:center;
gap:8px;

background:var(--red);

padding:8px 14px;

border-radius:999px;

font-size:13px;
font-weight:800;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#fff;

animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:.2;
transform:scale(.7);
}
}

.match{
display:grid;
grid-template-columns:1fr 120px 1fr;

gap:12px;
align-items:center;
}

.team{
text-align:center;
}

.team img{
width:76px;
height:76px;

background:#fff;

padding:10px;

border-radius:22px;
}

.team-name{
margin-top:10px;
font-size:14px;
font-weight:700;
}

.team-form{
margin-top:5px;
font-size:11px;
color:#bbb;
}

.score-box{
background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

border-radius:24px;

padding:18px 10px;

text-align:center;
}

.score{
font-size:42px;
font-weight:900;
}

.score span{
color:var(--gold);
}

.match-status{
margin-top:6px;
font-size:12px;
color:#aaa;
}

.watch-btn{
width:100%;
margin-top:18px;

border:none;

padding:15px;

border-radius:18px;

background:
linear-gradient(90deg,#ff1744,#850000);

color:#fff;

font-size:15px;
font-weight:800;
}

/* SECTION */

.section{
padding:0 18px;
margin-top:22px;
}

.title{
font-size:18px;
font-weight:900;
margin-bottom:14px;
}

.title span{
color:var(--red);
}

/* LEAGUES */

.leagues{
display:flex;
gap:14px;

overflow:auto;
padding-bottom:4px;
}

.leagues::-webkit-scrollbar{
display:none;
}

.league{
min-width:84px;

background:#101010;

padding:12px 10px;

border-radius:22px;

text-align:center;

border:1px solid rgba(255,255,255,.05);

cursor:pointer;

transition:.25s;
}

.league.active{
border-color:rgba(255,0,0,.5);

box-shadow:
0 0 20px rgba(255,0,0,.18);
}

.league img{
width:44px;
height:44px;

background:#fff;

padding:6px;

border-radius:14px;
}

.league-name{
margin-top:8px;
font-size:11px;
font-weight:700;
}

/* STATS CARDS */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;

padding:18px;
}

.card{
background:#101010;

border-radius:24px;

padding:16px;

border:1px solid rgba(255,255,255,.05);
}

.card-label{
font-size:12px;
color:#999;
}

.card-value{
margin-top:8px;
font-size:28px;
font-weight:900;
}

/* AI */

.ai-box{
margin-top:18px;

background:rgba(255,255,255,.05);

padding:16px;

border-radius:22px;

border:1px solid rgba(255,255,255,.08);
}

.ai-top{
display:flex;
justify-content:space-between;

margin-bottom:12px;
}

.ai-title{
font-size:15px;
font-weight:800;
color:var(--gold);
}

.ai-bar{
height:12px;
background:#222;

border-radius:999px;

overflow:hidden;
}

.ai-fill{
height:100%;
width:68%;

background:
linear-gradient(90deg,#ff1744,#ffcc4d);
}

.predict{
margin-top:12px;
font-size:14px;
font-weight:700;
}

/* TABLE */

.table{
margin:18px;

background:#101010;

border-radius:28px;

padding:16px;

overflow:auto;
}

.table-title{
font-size:20px;
font-weight:900;

color:var(--gold);

margin-bottom:16px;
}

.table-head,
.row{
display:grid;
grid-template-columns:36px 2fr 52px 52px 52px 52px 60px;

align-items:center;
}

.table-head{
font-size:11px;
color:#999;

padding-bottom:10px;
}

.row{
padding:13px 0;

border-bottom:1px solid rgba(255,255,255,.05);

font-size:13px;
font-weight:600;
}

.team-row{
display:flex;
align-items:center;
gap:10px;

overflow:hidden;
white-space:nowrap;
}

.team-row img{
width:26px;
height:26px;

background:#fff;

padding:3px;

border-radius:8px;
}

.pts{
text-align:right;
font-weight:900;
color:var(--gold);
}

.top4{
background:rgba(255,204,77,.06);
}

/* PLAYER */

.players{
display:flex;
gap:14px;

overflow:auto;
padding-bottom:4px;
}

.players::-webkit-scrollbar{
display:none;
}

.player-card{
min-width:170px;

background:#101010;

border-radius:24px;

padding:14px;

text-align:center;
}

.player-card img{
width:84px;
height:84px;

border-radius:50%;

object-fit:cover;

border:3px solid rgba(255,255,255,.1);
}

.player-name{
margin-top:12px;
font-size:14px;
font-weight:700;
}

.player-stat{
margin-top:6px;
font-size:12px;
color:#bbb;
}

/* FIXTURES */

.fixtures{
display:flex;
flex-direction:column;
gap:14px;
}

.fixture{
background:#101010;

padding:16px;

border-radius:22px;
}

.fixture-top{
display:flex;
justify-content:space-between;

margin-bottom:12px;

font-size:12px;
color:#aaa;
}

.fixture-match{
display:flex;
justify-content:space-between;
align-items:center;
}

.fixture-team{
display:flex;
align-items:center;
gap:10px;
}

.fixture-team img{
width:32px;
height:32px;

background:#fff;

padding:3px;

border-radius:8px;
}

/* NEWS */

.news-list{
display:flex;
flex-direction:column;
gap:14px;
}

.news-card{
background:#101010;

border-radius:22px;

padding:16px;

display:flex;
gap:14px;

align-items:center;
}

.news-img{
width:92px;
height:72px;

border-radius:16px;

object-fit:cover;
}

.news-title{
font-size:14px;
font-weight:700;
}

/* HIGHLIGHT */

.highlights{
display:flex;
gap:16px;

overflow:auto;

padding-bottom:4px;
}

.highlights::-webkit-scrollbar{
display:none;
}

.highlight{
position:relative;

min-width:240px;
height:170px;

overflow:hidden;

border-radius:24px;
}

.highlight img{
width:100%;
height:100%;

object-fit:cover;

filter:brightness(.75);
}

.highlight::after{
content:'';
position:absolute;
inset:0;

background:
linear-gradient(180deg,transparent,rgba(0,0,0,.88));
}

.play{
position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:58px;
height:58px;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,0,0,.9);

border-radius:50%;

font-size:24px;

z-index:2;
}

.highlight-title{
position:absolute;

left:14px;
bottom:14px;

z-index:2;

font-size:14px;
font-weight:700;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;

left:50%;
transform:translateX(-50%);

bottom:16px;

width:calc(100% - 24px);
max-width:520px;

background:rgba(15,15,15,.92);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.05);

padding:12px 10px;

border-radius:28px;

display:grid;
grid-template-columns:repeat(5,1fr);

z-index:999;
}

.nav-item{
text-align:center;

font-size:11px;

color:#999;

cursor:pointer;
}

.nav-item.active{
color:#fff;
font-weight:800;
}

.nav-icon{
font-size:22px;
margin-bottom:4px;
}

@media(max-width:480px){

.match{
grid-template-columns:1fr 100px 1fr;
}

.team img{
width:66px;
height:66px;
}

.score{
font-size:30px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
<span>QA</span> BallGenius
</div>

<div class="header-actions">
<div class="icon-btn">🔔</div>
<div class="icon-btn">⚙️</div>
</div>

</header>

<div class="page active">

<section class="hero">

<div class="hero-card" id="heroCard"></div>

</section>

<section class="section">

<div class="title">
<span>■</span> ลีกยอดนิยม
</div>

<div class="leagues" id="leagueBar"></div>

</section>

<div class="grid">

<div class="card">
<div class="card-label">LIVE MATCH</div>
<div class="card-value">12</div>
</div>

<div class="card">
<div class="card-label">AI Accuracy</div>
<div class="card-value" style="color:#00d26a;">91%</div>
</div>

</div>

<section class="section">

<div class="title">
<span>■</span> นักเตะฟอร์มแรง
</div>

<div class="players" id="players"></div>

</section>

<section class="section">

<div class="title">
<span>■</span> โปรแกรมแข่ง
</div>

<div class="fixtures" id="fixtures"></div>

</section>

<section class="table">

<div class="table-title" id="tableTitle"></div>

<div id="tableContent"></div>

</section>

<section class="section">

<div class="title">
<span>■</span> ข่าวฟุตบอล
</div>

<div class="news-list">

<div class="news-card">
<img class="news-img" src="https://picsum.photos/200/120?1">
<div class="news-title">
Liverpool เตรียมเปิดดีลระดับโลกซัมเมอร์นี้
</div>
</div>

<div class="news-card">
<img class="news-img" src="https://picsum.photos/200/120?2">
<div class="news-title">
Real Madrid สนดึงดาวรุ่งฟอร์มแรง
</div>
</div>

</div>

</section>

<section class="section">

<div class="title">
<span>■</span> ไฮไลท์ล่าสุด
</div>

<div class="highlights" id="highlights"></div>

</section>

</div>

<div class="bottom-nav">

<div class="nav-item active">
<div class="nav-icon">⚽</div>
Home
</div>

<div class="nav-item">
<div class="nav-icon">📺</div>
Live
</div>

<div class="nav-item">
<div class="nav-icon">📊</div>
Table
</div>

<div class="nav-item">
<div class="nav-icon">📈</div>
Stats
</div>

<div class="nav-item">
<div class="nav-icon">🔥</div>
Clips
</div>

</div>

<script>

const LEAGUES=[

{
id:39,
name:'พรีเมียร์ลีก',
teams:[
['Liverpool',40],
['Arsenal',42],
['Man City',50],
['Chelsea',49],
['Tottenham',47],
['Man United',33]
]
},

{
id:140,
name:'ลาลีกา',
teams:[
['Barcelona',529],
['Real Madrid',541],
['Atletico',530],
['Girona',547],
['Betis',543],
['Sociedad',548]
]
},

{
id:78,
name:'บุนเดสลีกา',
teams:[
['Bayern',157],
['Leverkusen',168],
['Dortmund',165],
['Leipzig',173],
['Stuttgart',172],
['Frankfurt',169]
]
}

];

const heroCard=document.getElementById('heroCard');
const leagueBar=document.getElementById('leagueBar');
const tableContent=document.getElementById('tableContent');
const tableTitle=document.getElementById('tableTitle');
const highlights=document.getElementById('highlights');
const players=document.getElementById('players');
const fixtures=document.getElementById('fixtures');

LEAGUES.forEach((league,index)=>{

const div=document.createElement('div');

div.className='league'+(index===0?' active':'');

div.innerHTML=`
<img src="https://media.api-sports.io/football/leagues/${league.id}.png">
<div class="league-name">${league.name}</div>
`;

div.onclick=()=>{

document.querySelectorAll('.league')
.forEach(x=>x.classList.remove('active'));

div.classList.add('active');

renderLeague(league);

};

leagueBar.appendChild(div);

});

function renderLeague(league){

const home=league.teams[0];
const away=league.teams[1];

heroCard.innerHTML=`

<div class="live-top">

<div class="live-badge">
<div class="dot"></div>
LIVE MATCH
</div>

<div style="font-size:13px;color:#bbb;">
คืนนี้ 21:00
</div>

</div>

<div class="match">

<div class="team">

<img src="https://media.api-sports.io/football/teams/${home[1]}.png">

<div class="team-name">
${home[0]}
</div>

<div class="team-form">
🔥 ฟอร์มล่าสุด W W W
</div>

</div>

<div class="score-box">

<div class="score">
<span>2</span> :
<span>1</span>
</div>

<div class="match-status">
67' LIVE
</div>

</div>

<div class="team">

<img src="https://media.api-sports.io/football/teams/${away[1]}.png">

<div class="team-name">
${away[0]}
</div>

<div class="team-form">
⚡ ฟอร์มล่าสุด W D W
</div>

</div>

</div>

<div class="ai-box">

<div class="ai-top">

<div class="ai-title">
🤖 AI วิเคราะห์บอล
</div>

<div>
${home[0]} 68%
</div>

</div>

<div class="ai-bar">
<div class="ai-fill"></div>
</div>

<div class="predict">
AI วิเคราะห์:
${home[0]} ครองเกมดีกว่า มีโอกาสชนะสูงจากฟอร์มล่าสุดและ xG สูงกว่า
</div>

</div>

<button class="watch-btn">
▶ รับชมถ่ายทอดสด
</button>

`;

tableTitle.innerText=league.name+' ตารางคะแนน';

tableContent.innerHTML=`

<div class="table-head">

<div>#</div>
<div>ทีม</div>
<div>แข่ง</div>
<div>ชนะ</div>
<div>เสมอ</div>
<div>แพ้</div>
<div class="pts">แต้ม</div>

</div>

${league.teams.map((team,index)=>{

let played=30;
let win=22-index;
let draw=4;
let lose=played-win-draw;
let pts=(win*3)+draw;

let cls=index<4?'top4':'';

return`

<div class="row ${cls}">

<div>${index+1}</div>

<div class="team-row">

<img src="https://media.api-sports.io/football/teams/${team[1]}.png">

<span>${team[0]}</span>

</div>

<div>${played}</div>
<div>${win}</div>
<div>${draw}</div>
<div>${lose}</div>

<div class="pts">${pts}</div>

</div>

`;

}).join('')}

`;

players.innerHTML=league.teams.slice(0,5).map((team,index)=>`

<div class="player-card">

<img src="https://i.pravatar.cc/200?img=${index+10}">

<div class="player-name">
${team[0]} Star
</div>

<div class="player-stat">
⚽ ${10-index} Goals
</div>

<div class="player-stat">
🎯 ${6-index} Assists
</div>

</div>

`).join('');

fixtures.innerHTML=league.teams.slice(0,3).map((team,index)=>`

<div class="fixture">

<div class="fixture-top">
<div>คืนนี้</div>
<div>21:00</div>
</div>

<div class="fixture-match">

<div class="fixture-team">
<img src="https://media.api-sports.io/football/teams/${team[1]}.png">
${team[0]}
</div>

<div>VS</div>

<div class="fixture-team">
<img src="https://media.api-sports.io/football/teams/${league.teams[index+1]?.[1] || team[1]}.png">
${league.teams[index+1]?.[0] || team[0]}
</div>

</div>

</div>

`).join('');

highlights.innerHTML=league.teams.map((team,index)=>`

<div class="highlight">

<img src="https://picsum.photos/500/300?random=${league.id+index}">

<div class="play">
▶
</div>

<div class="highlight-title">
${team[0]} ไฮไลท์ล่าสุด
</div>

</div>

`).join('');

}

renderLeague(LEAGUES[0]);

</script>

</body>
</html>
